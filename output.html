<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Lumina Pro - Output</title>
    <style>
      body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background: black;
        cursor: none; /* Hide cursor on the projector screen */
      }
      canvas {
        width: 100vw; height: 100vh;
        display: block;
      }
      #tip {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.3); font-family: sans-serif;
        font-size: 1.25rem; font-weight: bold;
        pointer-events: none; transition: opacity 2s;
        z-index: 1000;
      }
      body:fullscreen #tip { display: none; }
    </style>
  </head>
  <body>
    <div id="tip">画面をクリックして全画面表示へ (Escで戻る)</div>
    <canvas id="output-canvas"></canvas>
    <video id="input-video" playsinline style="display:none"></video>
    <script type="module" src="/output.js"></script>
  </body>
</html>
